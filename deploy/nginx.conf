# markdown2web — Nginx reverse proxy example
# Replace server_name; client_max_body_size must be ≥ M2W_UPLOAD_LIMIT_MB (+ headroom)

upstream markdown2web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS (enable when using Let's Encrypt)
# server {
#     listen 80;
#     server_name your.domain.example;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # Production: listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    server_name _;

    # Match M2W_UPLOAD_LIMIT_MB=128 with headroom (raise if you upload large videos)
    client_max_body_size 140m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://markdown2web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large uploads / long rebuilds
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
