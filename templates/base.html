<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#FF5D8F" />
        <title>{% block title %}{{ site_name }}{% endblock %}</title>
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+SC:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
        <link
            rel="stylesheet"
            href="/static/css/app.css?v=20260720-neobrutal-01"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css"
            crossorigin="anonymous"
        />
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"
            crossorigin="anonymous"
        ></script>
        <script defer src="/static/js/site.js?v=20260720-neobrutal-01"></script>
        {% block scripts %}{% endblock %}
    </head>
    <body>
        <div class="reading-progress" aria-hidden="true"></div>
        <div class="cursor-beacon" aria-hidden="true">
            <span class="cursor-beacon-core"></span>
        </div>

        <div class="marquee" aria-hidden="true">
            <div class="marquee__track">
                <span>★ 欢迎来到 {{ site_name }} ★ NOTES &amp; THOUGHTS ★ 每周更新 ★ 欢迎来玩 ★ 贴纸贴满为止 ★&nbsp;</span>
                <span>★ 欢迎来到 {{ site_name }} ★ NOTES &amp; THOUGHTS ★ 每周更新 ★ 欢迎来玩 ★ 贴纸贴满为止 ★&nbsp;</span>
            </div>
        </div>

        <header class="nav site-header">
            <a class="nav__logo brand" href="/">
                <span class="nav__logo-badge" aria-hidden="true">N!</span>
                <span>{{ site_name }}</span>
            </a>
            <button
                class="nav-toggle"
                type="button"
                aria-label="Toggle navigation"
                aria-expanded="false"
                data-nav-toggle
            >
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>
            <nav class="nav__links nav-links" data-nav-menu>
                <a class="nav__link nav-link" href="/">首页</a>
                <a class="nav__link nav-link" href="/notes">笔记</a>
                <a class="nav__link nav-link" href="/#about">关于</a>
                <a class="nav__link nav-link" href="/search">搜索</a>
                <a class="nav__link nav-link" href="/account">账号</a>
                <a class="nav__link nav-link" href="/admin">后台</a>
            </nav>
            <a href="/notes" class="btn btn--pink nav__cta">看笔记 →</a>
        </header>
        <div class="nav-overlay" data-nav-overlay aria-hidden="true"></div>

        <main class="shell page-shell {% block main_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer site-footer">
            <p class="footer__big">{{ site_name }}</p>
            <p class="mono footer__line">© 2026 · 用积木搭的，拆了重搭也没关系 ★</p>
            <a href="#" class="footer__top mono" data-back-to-top>↑ 回到顶部</a>
        </footer>
    </body>
</html>
