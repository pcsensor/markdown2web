<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="/static/css/app.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="/static/js/site.js"></script>
  </head>
  <body>
    <div class="reading-progress" aria-hidden="true"></div>
    <div class="cursor-beacon" aria-hidden="true">
      <span class="cursor-beacon-core"></span>
    </div>
    <div class="site-backdrop" aria-hidden="true">
      <div class="site-orb orb-a"></div>
      <div class="site-orb orb-b"></div>
      <div class="site-grid"></div>
    </div>

    <header class="site-header">
      <div class="shell nav-row">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none">
              <rect x="3" y="3" width="26" height="26" rx="9" />
              <path d="M11 12h10M11 16h7M11 20h10" />
            </svg>
          </span>
          <span>{{ site_name }}</span>
        </a>
        <nav class="nav-links">
          <a class="nav-link" href="/">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none"><path d="M3 9.2 10 3l7 6.2V17H3V9.2Z" /><path d="M8 17v-4h4v4" /></svg>
            </span>
            <span>Home</span>
          </a>
          <a class="nav-link" href="/notes">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="3" /><path d="M7 7h6M7 10h6M7 13h4" /></svg>
            </span>
            <span>Notes</span>
          </a>
          <a class="nav-link" href="/search">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="4.5" /><path d="m12.5 12.5 4 4" /></svg>
            </span>
            <span>Search</span>
          </a>
          <a class="nav-link" href="/account">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.2" /><path d="M4.5 17c1.1-2.7 3-4 5.5-4s4.4 1.3 5.5 4" /></svg>
            </span>
            <span>Account</span>
          </a>
          <a class="nav-link" href="/admin">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="3" /><path d="M7 9h6M10 6.5v5" /></svg>
            </span>
            <span>Admin</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="shell page-shell {% block main_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="shell footer-row">
        <div>
          <p class="eyebrow">markdown2web</p>
          <p class="footer-copy">让 Markdown 内容以更优雅、更现代的方式发布到网页。</p>
        </div>
        <div class="footer-pill">
          <span class="footer-pill-icon" aria-hidden="true">✦</span>
          <span>Content-first · SSR · Rust</span>
        </div>
      </div>
    </footer>
  </body>
</html>
