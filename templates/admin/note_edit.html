{% extends "base.html" %}
{% block title %}{{ mode }} Note · {{ site_name }}{% endblock %}
{% block content %}
<section class="stack-header polished-admin-header">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>{{ mode }} Note</h1>
    <p class="muted">当前用户：{{ username }}</p>
  </div>
</section>

<form class="editor-grid" action="/admin/notes/save" method="post">
  <div class="panel stack-form interactive-card">
    <div class="panel-title-row">
      <h2>元信息</h2>
      <span class="panel-chip">meta</span>
    </div>
    <label>标题<input type="text" name="title" value="{{ note.title }}" required /></label>
    <label>Slug<input type="text" name="slug" value="{{ note.slug }}" /></label>
    <label>摘要<textarea name="summary">{{ note.summary }}</textarea></label>
    <label>标签（逗号分隔）<input type="text" name="tags" value="{{ note.tags }}" /></label>
    <label>分类（逗号分隔）<input type="text" name="category" value="{{ note.category }}" /></label>
    <label>别名（逗号分隔）<input type="text" name="aliases" value="{{ note.aliases }}" /></label>
    <label>状态
      <select name="status">
        <option value="published" {% if note.status == "published" %}selected{% endif %}>published</option>
        <option value="draft" {% if note.status == "draft" %}selected{% endif %}>draft</option>
      </select>
    </label>
    <label>更新时间
      <div style="display: flex; gap: 8px; align-items: center;">
        <input type="datetime-local" name="updated" id="note-updated" value="{{ note.updated }}" style="flex: 1;" />
        <button type="button" class="button secondary" id="set-now-btn" style="padding: 0.4em 0.8em; font-size: 0.85rem; white-space: nowrap;">设为现在</button>
      </div>
    </label>
    <div class="admin-actions">
      <button type="submit">保存笔记</button>
      <a class="button secondary" href="/admin">返回仪表盘</a>
    </div>
  </div>

  <div class="panel stack-form wide-editor interactive-card">
    <div class="panel-title-row">
      <h2>Markdown 正文</h2>
      <span class="panel-chip">editor</span>
    </div>
    <label>正文<textarea name="body" class="editor-textarea">{{ note.body }}</textarea></label>
  </div>
</form>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const updatedInput = document.getElementById('note-updated');
    const setNowBtn = document.getElementById('set-now-btn');

    function formatDateTime(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
    }

    // 自动填充空值
    if (updatedInput && !updatedInput.value.trim()) {
      updatedInput.value = formatDateTime(new Date());
    } else if (updatedInput.value.includes(' ')) {
      // 兼容旧的 "YYYY-MM-DD HH:MM" 格式到 "YYYY-MM-DDTHH:MM"
      updatedInput.value = updatedInput.value.replace(' ', 'T');
    }

    // “设为现在”按钮逻辑
    if (setNowBtn && updatedInput) {
      setNowBtn.addEventListener('click', () => {
        updatedInput.value = formatDateTime(new Date());
      });
    }
  });
</script>
{% endblock %}
