{% extends "base.html" %}
{% block title %}Category {{ category }} · {{ site_name }}{% endblock %}
{% block content %}
<section class="stack-header page-intro">
  <h1 class="section-title">
    <span class="section-title__tag mono">CAT</span>
    {{ category }}
  </h1>
  <p class="muted">聚合同一类别下的笔记内容。</p>
</section>
<section class="grid card-grid stack-list">
  {% for note in notes %}
  <article class="card list-card interactive-card" style="--tilt:{% if loop.index0 % 2 == 0 %}-1deg{% else %}1deg{% endif %}">
    <div class="card__top">
      <span class="card__cat mono">NOTE</span>
    </div>
    <h3 class="card__title"><a href="/notes/{{ note.slug }}">{{ note.title }}</a></h3>
    <p class="card__excerpt">{{ note.summary }}</p>
    <a href="/notes/{{ note.slug }}" class="card__more">阅读全文 <span aria-hidden="true">→</span></a>
  </article>
  {% endfor %}
</section>
{% endblock %}
